<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LostndFound - Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<div class="login-container">
<div class="image-section">
</div>
<div class="form-section">
<img src="images/Logo_bg.png" class="logo">
<div class="title-block">LostndFound</div>
<h2>Login</h2>
<form>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<div class="button-group">
<button type="button" class="login-btn user-btn" onclick="window.location.href='pages/user_home.html'">Login as User</button>
<button type="button" class="login-btn admin-btn" onclick="window.location.href='pages/admin_claim_requests.html'">Login as Admin</button>
</div>
<p>Don't have an account? <button type="button" class="signup-link" onclick="window.location.href='pages/signup.html'">Sign Up</button></p>
</form>
</div>
</div>

<script src="js/script.js"></script>
</body>
</html>
